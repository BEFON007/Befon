name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        run: |
          # Скачиваем официальную обертку напрямую
          curl -L https://github.com -o gradlew
          chmod +x gradlew
          mkdir -p gradle/wrapper
          curl -L https://github.com -o gradle/wrapper/gradle-wrapper.jar
          curl -L https://github.com -o gradle/wrapper/gradle-wrapper.properties
          # Создаем пустой settings.gradle если его нет
          echo "rootProject.name = 'minimap'" > settings.gradle
      - name: Build with Gradle
        run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: Minimap-Jar
          path: build/libs/*.jar
