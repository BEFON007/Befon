name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Build
        run: |
          curl -Lo gradlew https://raw.githubusercontent.com
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com
          curl -Lo gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com
          chmod +x gradlew
          ./gradlew build
      - uses: actions/upload-artifact@v4
        with: { name: Minimap-Jar, path: build/libs/*.jar }
